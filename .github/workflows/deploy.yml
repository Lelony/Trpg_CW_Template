name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 메인 브랜치에 푸시할 때 실행
  workflow_dispatch: # 수동으로도 실행 가능하게 설정

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 번 배포되는 것을 방지
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # package-lock.json 기반으로 깨끗하게 설치

      - name: Build project
        run: npm run build # TypeScript -> JS 빌드 실행

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite의 기본 빌드 폴더인 dist를 업로드
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
